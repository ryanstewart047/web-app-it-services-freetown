<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - IT Services Freetown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background: #ffffff;
        }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        
        .hero p {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
            margin-bottom: 30px;
        }
        
        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        
        /* Main Container */
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 40px;
        }
        
        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }
        
        /* Article Card */
        .article-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        
        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.15);
        }
        
        .article-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .article-thumbnail::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1), transparent 70%);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }
        
        .article-content-wrapper {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        .article-header {
            margin-bottom: 12px;
        }
        
        .article-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .article-meta {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: #7f8c8d;
            flex-wrap: wrap;
        }
        
        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .article-excerpt {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            margin: 15px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 15px 0;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }
        
        .tag {
            background: #f0f3ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        
        /* Hidden Content */
        .article-full-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding: 0 25px;
            font-size: 0.95rem;
            color: #555;
        }
        
        .article-full-content.expanded {
            max-height: 2000px;
            padding: 20px 25px;
            border-top: 1px solid #ecf0f1;
        }
        
        .article-full-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 15px 0 10px 0;
        }
        
        .article-full-content h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #34495e;
            margin: 12px 0 8px 0;
        }
        
        .article-full-content ul, .article-full-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }
        
        .article-full-content li {
            margin-bottom: 6px;
        }
        
        .article-full-content p {
            margin-bottom: 10px;
        }
        
        /* Actions */
        .article-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }
        
        .btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-view {
            background: #667eea;
            color: white;
        }
        
        .btn-view:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-copy {
            background: #27ae60;
            color: white;
        }
        
        .btn-copy:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }
        
        .btn-title {
            background: #e8f1f8;
            color: #667eea;
        }
        
        .btn-title:hover {
            background: #d4e6f4;
            transform: translateY(-2px);
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: -100px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 16px 28px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            font-weight: 600;
            z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .notification.show {
            bottom: 30px;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .articles-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }
            
            .hero h1 {
                font-size: 2.8rem;
            }
        }
        
        @media (max-width: 768px) {
            .articles-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .hero {
                padding: 50px 25px;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .main-container {
                padding: 40px 20px;
            }
            
            .article-thumbnail {
                height: 150px;
                font-size: 3rem;
            }
            
            .article-content-wrapper {
                padding: 20px;
            }
            
            .article-title {
                font-size: 1.15rem;
            }
            
            .article-excerpt {
                font-size: 0.9rem;
            }
            
            .article-meta {
                font-size: 0.8rem;
            }
            
            .btn {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            
            .article-actions {
                flex-direction: column;
            }
        }
        
        @media (max-width: 480px) {
            .hero {
                padding: 40px 15px;
            }
            
            .hero h1 {
                font-size: 1.6rem;
            }
            
            .hero p {
                font-size: 0.95rem;
            }
            
            .main-container {
                padding: 25px 15px;
            }
            
            .article-thumbnail {
                height: 120px;
                font-size: 2.5rem;
            }
            
            .article-content-wrapper {
                padding: 15px;
            }
            
            .article-title {
                font-size: 1rem;
                margin-bottom: 6px;
            }
            
            .article-excerpt {
                font-size: 0.85rem;
                margin: 10px 0;
            }
            
            .article-meta {
                font-size: 0.75rem;
                gap: 8px;
            }
            
            .tag {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            
            .btn {
                padding: 7px 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-content">
            <div class="hero-badge">✨ Expert Tech Insights & Solutions</div>
            <h1>Blog & Knowledge Base</h1>
            <p>Stay updated with the latest IT tips, device repair guides, and technology news for Sierra Leone</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-container">
        <div class="articles-grid" id="articleList">
            <!-- Articles loaded by JavaScript -->
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="copyNotification"></div>
    
    <script>
        const emojis = ['📱', '🖥️', '🔧', '💻', '⚙️', '🛠️', '🔌', '📡'];
        
        // Load articles from JSON files
        async function loadArticles() {
            try {
                const files = [
                    'content/blog-articles.json',
                    'content/blog-articles-2.json',
                    'content/blog-articles-4.json'
                ];
                
                const allArticles = [];
                
                for (const file of files) {
                    try {
                        const response = await fetch(file);
                        const data = await response.json();
                        allArticles.push(...data);
                    } catch (err) {
                        console.log(`Could not load ${file}:`, err);
                    }
                }
                
                if (allArticles.length === 0) {
                    displayManualArticles();
                } else {
                    displayArticles(allArticles);
                }
            } catch (error) {
                console.error('Error loading articles:', error);
                displayManualArticles();
            }
        }
        
        function displayArticles(articles) {
            const container = document.getElementById('articleList');
            
            container.innerHTML = articles.map((article, index) => {
                const wordCount = article.content.replace(/<[^>]+>/g, ' ').split(/\s+/).length;
                const emoji = emojis[index % emojis.length];
                const tagsHTML = article.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                
                return `
                    <div class="article-card">
                        <div class="article-thumbnail">${emoji}</div>
                        <div class="article-content-wrapper">
                            <div class="article-header">
                                <div class="article-title">${article.title}</div>
                                <div class="article-meta">
                                    <div class="article-meta-item">✍️ ${article.author}</div>
                                    <div class="article-meta-item">📝 ~${wordCount} words</div>
                                </div>
                            </div>
                            <div class="article-excerpt">${article.excerpt}</div>
                            <div class="article-tags">${tagsHTML}</div>
                            <div class="article-full-content" id="content-${index}">
                                ${article.content}
                            </div>
                            <div class="article-actions">
                                <button class="btn btn-view" onclick="toggleContent(${index})">
                                    <span id="btn-text-${index}">📖 Read</span>
                                </button>
                                <button class="btn btn-copy" onclick="copyHTML(${index}, '${article.title.replace(/'/g, "\\'")}')">
                                    📋 Copy
                                </button>
                                <button class="btn btn-title" onclick="copyTitle('${article.title.replace(/'/g, "\\'")}')">
                                    ✏️ Title
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function displayManualArticles() {
            const container = document.getElementById('articleList');
            container.innerHTML = `
                <div style="grid-column: 1 / -1; padding: 40px 20px; text-align: center; background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);">
                    <h2 style="font-size: 1.8rem; color: #2c3e50; margin-bottom: 15px;">📁 Articles Not Found</h2>
                    <p style="color: #555; margin-bottom: 10px;">The articles are stored in JSON files:</p>
                    <ul style="text-align: left; display: inline-block; margin: 15px 0; color: #555;">
                        <li>content/blog-articles.json</li>
                        <li>content/blog-articles-2.json</li>
                        <li>content/blog-articles-4.json</li>
                    </ul>
                </div>
            `;
        }
        
        function toggleContent(index) {
            const content = document.getElementById(`content-${index}`);
            const btnText = document.getElementById(`btn-text-${index}`);
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                btnText.textContent = '📖 Read';
            } else {
                content.classList.add('expanded');
                btnText.textContent = '📖 Close';
            }
        }
        
        function copyHTML(index, title) {
            const content = document.getElementById(`content-${index}`);
            const html = content.innerHTML;
            
            navigator.clipboard.writeText(html).then(() => {
                showNotification(`✓ HTML copied!`);
            }).catch(err => {
                alert('Failed to copy. Please select and copy manually.');
            });
        }
        
        function copyTitle(title) {
            navigator.clipboard.writeText(title).then(() => {
                showNotification(`✓ Title copied!`);
            });
        }
        
        function showNotification(message) {
            const notification = document.getElementById('copyNotification');
            notification.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // Load articles on page load
        loadArticles();
    </script>
</body>
</html>
