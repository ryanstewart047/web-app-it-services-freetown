version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: its-freetown-db
    environment:
      POSTGRES_DB: ${DB_NAME:-its_freetown_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - its-freetown-network
    restart: unless-stopped

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: its-freetown-app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-its_freetown_db}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      FORM_SIGNING_KEY: ${FORM_SIGNING_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - its-freetown-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Optional: Adminer for database management (comment out if not needed)
  adminer:
    image: adminer:latest
    container_name: its-freetown-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - its-freetown-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  its-freetown-network:
    driver: bridge
